<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Character Feedback</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦋</text></svg>">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="/dash/shared/styles/theme.css">
    <link rel="stylesheet" href="/dash/shared/styles/brand.css">
    <link rel="stylesheet" href="/dash/shared/styles/fonts.css">
    <link rel="stylesheet" href="/dash/shared/styles/components.css">
    <link rel="stylesheet" href="/dash/shared/styles/base.css">
    <link rel="stylesheet" href="/dash/shared/styles/layout.css">
    <link rel="stylesheet" href="/dash/shared/styles/buttons.css">
    <link rel="stylesheet" href="/dash/shared/styles/forms.css">
    <link rel="stylesheet" href="/dash/shared/styles/status.css">
    <link rel="stylesheet" href="/dash/shared/styles/notifications.css">
    <link rel="stylesheet" href="/dash/shared/styles/script_editor_styles.css">
    <link rel="stylesheet" href="/dash/shared/styles/missing-layout.css">
    <link rel="stylesheet" href="/dash/shared/styles/navigation.css">
    <link rel="stylesheet" href="/dash/shared/styles/sidebar.css">
    <link rel="stylesheet" href="/dash/shared/styles/bottom-navigation.css">
    <link rel="stylesheet" href="/dash/shared/styles/dash.css">
</head>
<body class="has-sidebar">
    <div id="stickyStatusBar" style="position:fixed;top:0;left:280px;right:0;background:transparent;padding:4px 20px;z-index:999;display:flex;justify-content:flex-end;align-items:center;pointer-events:none;">
        <div class="status-indicator" id="stickyStatusIndicator" style="pointer-events:auto;">Loading</div>
    </div>

    <div id="sidebarContainer"></div>

    <div class="container with-sidebar" style="padding-top:30px;">
        <div class="header"><h1 class="page-title">Character Feedback</h1></div>
        <div id="content">
            <div id="infoBox"></div>
            <div id="charList"></div>
        </div>
        <div id="noRecordsMessage" class="message" style="display:none;"></div>
    </div>

    <script src="/dash/shared/js/theme-manager.js"></script>
    <script type="module" src="/dash/shared/js/sidebar-component.js"></script>
    <script type="module">
        import BottomNavigation from '/dash/shared/js/bottom-navigation.js';
        import { supabase, loadPageConfig, applyPageTitle, loadEditInfo, renderInfoBox, updateStatus, patchRows, showNoRecords } from '/dash/shared/js/dash-utils.js';
        import { loadRatingsForRecords, saveRatings } from '/dash/shared/js/rating-utils.js';

        const PAGE = 'character_feedback';
        const TABLE = 'ms_characters';
        let cfg = null, editQueue = [], idx = 0, chars = [], hasUnsaved = false, busy = false;

        const bottomNav = new BottomNavigation({ onSave: () => saveAndContinue(), onNavigate: (d) => navigate(d), showAutoSave: true });
        window.updateBottomNavigation = (i, t) => bottomNav.updateNavigation(i, t);
        window.setUnsavedChanges = (v) => bottomNav.setUnsavedChanges(v);

        function autoGrow(ta) { const sy = window.scrollY; ta.style.height = 'auto'; ta.style.height = Math.max(parseInt(getComputedStyle(ta).minHeight) || 180, ta.scrollHeight + 6) + 'px'; if (window.scrollY !== sy) window.scrollTo(0, sy); }
        const esc = (s) => (s || '').replace(/</g, '&lt;');

        async function init() {
            try {
                updateStatus('loading', 'Loading...');
                cfg = await loadPageConfig(PAGE);
                applyPageTitle(cfg);
                const { data, error } = await supabase.from(TABLE)
                    .select('edit_id').eq('is_main_character', true).eq('character_status_id', cfg.display_status_id)
                    .order('edit_id', { ascending: true });
                if (error) throw error;
                editQueue = [...new Set((data || []).map(r => r.edit_id))];
                if (!editQueue.length) { showNoRecords('No main-character feedback is at the review stage.'); updateStatus('completed', 'All done'); return; }
                await loadEdit();
                bottomNav.startAutoSave(autoSave);
            } catch (e) { console.error(e); updateStatus('error', e.message); showNoRecords(e.message); }
        }

        async function loadEdit() {
            const editId = editQueue[idx];
            updateStatus('loading', 'Loading edit ' + editId + '...');
            renderInfoBox('infoBox', await loadEditInfo(editId));

            const { data, error } = await supabase.from(TABLE)
                .select('ms_character_id, first_name, last_name, character_feedback, is_main_character')
                .eq('edit_id', editId).eq('is_main_character', true).eq('character_status_id', cfg.display_status_id)
                .order('ms_character_id', { ascending: true });
            if (error) { updateStatus('error', error.message); return; }
            chars = data || [];

            const ids = chars.map(c => c.ms_character_id);
            const fbR = await loadRatingsForRecords(TABLE, ids, 'character_feedback');

            document.getElementById('charList').innerHTML = chars.map(c => {
                const name = [c.first_name, c.last_name].filter(Boolean).join(' ') || ('Character ' + c.ms_character_id);
                return `
                  <div class="dash-group-heading" style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
                    <span>${esc(name)}</span>
                    <label style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;font-weight:400;white-space:nowrap;cursor:pointer;">
                      <input type="checkbox" id="main_${c.ms_character_id}" ${c.is_main_character ? 'checked' : ''}>
                      Main character
                    </label>
                  </div>
                  <span class="dash-field-label">Character Feedback</span>
                  <div class="dash-row">
                    <div class="dash-row__text"><textarea class="dash-textarea" id="fb_${c.ms_character_id}">${esc(c.character_feedback)}</textarea></div>
                    <div class="dash-row__side"><span class="dash-rating-label">Rating / 100</span>
                      <input type="number" min="1" max="100" class="dash-rating-input" id="rating_fb_${c.ms_character_id}" value="${fbR[c.ms_character_id] != null ? fbR[c.ms_character_id] : ''}"></div>
                  </div>`;
            }).join('');

            document.querySelectorAll('.dash-textarea').forEach(ta => { autoGrow(ta); ta.addEventListener('input', () => { autoGrow(ta); markUnsaved(); }); });
            document.querySelectorAll('.dash-rating-input').forEach(el => el.addEventListener('input', markUnsaved));
            chars.forEach(c => { const el = document.getElementById('main_' + c.ms_character_id); if (el) el.addEventListener('change', markUnsaved); });

            hasUnsaved = false; window.setUnsavedChanges(false);
            window.updateBottomNavigation(idx, editQueue.length);
            updateStatus('saved', 'Loaded edit ' + editId);
            document.getElementById('content').style.display = 'block';
            document.getElementById('noRecordsMessage').style.display = 'none';
        }

        function markUnsaved() { hasUnsaved = true; updateStatus('unsaved', 'Unsaved changes'); window.setUnsavedChanges(true); }

        async function persist() {
            for (const c of chars) {
                const fb = document.getElementById('fb_' + c.ms_character_id).value;
                const isMain = document.getElementById('main_' + c.ms_character_id).checked;
                await patchRows(TABLE, 'ms_character_id', c.ms_character_id, { character_feedback: fb, is_main_character: isMain });
                const v = document.getElementById('rating_fb_' + c.ms_character_id).value;
                if (v !== '') await saveRatings(TABLE, c.ms_character_id, { character_feedback: v });
            }
        }

        async function autoSave() {
            if (!hasUnsaved || busy) return;
            await persist(); hasUnsaved = false; window.setUnsavedChanges(false); updateStatus('saved', 'Auto-saved');
        }

        async function saveAndContinue() {
            if (busy) return; busy = true;
            try {
                updateStatus('loading', 'Saving...');
                await persist();
                const editId = editQueue[idx];
                // Approve ALL of this edit's characters still at the review status, including any
                // demoted here (no longer is_main_character) so they are not orphaned at review.
                const { error } = await supabase.from(TABLE)
                    .update({ character_status_id: cfg.next_status_id })
                    .eq('edit_id', editId).eq('character_status_id', cfg.display_status_id);
                if (error) throw error;
                editQueue.splice(idx, 1);
                hasUnsaved = false; window.setUnsavedChanges(false);
                if (!editQueue.length) { showNoRecords('All main-character feedback reviewed.'); updateStatus('completed', 'All done'); return; }
                if (idx >= editQueue.length) idx = 0;
                await loadEdit();
            } catch (e) { console.error(e); updateStatus('error', e.message); }
            finally { busy = false; }
        }

        async function navigate(d) {
            if (busy) return;
            if (hasUnsaved && !confirm('You have unsaved changes. Continue without saving?')) return;
            const n = idx + d;
            if (n < 0 || n >= editQueue.length) return;
            idx = n; await loadEdit();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
