<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected - Vidsponential</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="/shared/js/theme-loader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .logo {
            height: 40px;
            margin-bottom: 48px;
        }

        .card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .success-icon {
            width: 72px;
            height: 72px;
            background: #ecfdf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .success-icon svg {
            width: 36px;
            height: 36px;
            color: var(--color-success);
        }

        .card h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .channel-name {
            display: inline-block;
            background: var(--bg-tertiary);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            margin: 16px 0 24px;
            color: var(--text-primary);
        }

        .next-steps {
            text-align: left;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
        }

        .next-steps h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent-primary-light);
            color: var(--accent-primary);
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step span {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        @media (max-width: 540px) {
            .card { padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/shared/assets/vidsponential%20logo.png" alt="Vidsponential" class="logo">

        <div class="card">
            <div class="success-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h1>Channel Connected</h1>
            <p>Your YouTube channel has been successfully linked.</p>

            <div class="channel-name" id="channelName">Loading...</div>

            <div class="next-steps">
                <h3>What happens now</h3>
                <div class="step">
                    <div class="step-num">1</div>
                    <span>We'll pull your analytics data within the next few hours</span>
                </div>
                <div class="step">
                    <div class="step-num">2</div>
                    <span>Data updates automatically every day from here</span>
                </div>
                <div class="step">
                    <div class="step-num">3</div>
                    <span>You can close this page. Nothing else needed from you.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var name = params.get('channel');
        var el = document.getElementById('channelName');
        if (name) {
            el.textContent = name;
        } else {
            el.textContent = 'Your channel';
        }
    </script>
</body>
</html>
