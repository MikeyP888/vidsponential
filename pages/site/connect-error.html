<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Error - Vidsponential</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="/shared/js/theme-loader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 48px;
            color: var(--text-primary);
        }

        .card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .error-icon {
            width: 72px;
            height: 72px;
            background: #fef2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .error-icon svg {
            width: 36px;
            height: 36px;
            color: var(--color-error);
        }

        .card h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error-detail {
            background: var(--bg-tertiary);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-muted);
            font-family: monospace;
            margin-bottom: 32px;
            word-break: break-all;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--accent-primary);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-retry:hover {
            background: var(--accent-primary-hover);
            transform: translateY(-1px);
        }

        .help-text {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        @media (max-width: 540px) {
            .card { padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">vidsponential</div>

        <div class="card">
            <div class="error-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </div>

            <h1>Connection Failed</h1>
            <p>Something went wrong while connecting your YouTube channel. This usually happens if the authorisation was cancelled or timed out.</p>

            <div class="error-detail" id="errorDetail">No error details available</div>

            <a href="/connect" class="btn-retry">Try Again</a>
        </div>

        <p class="help-text">
            If this keeps happening, let Michael know and he'll sort it out.
        </p>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var error = params.get('error');
        var el = document.getElementById('errorDetail');
        if (error) {
            el.textContent = error;
        }
    </script>
</body>
</html>
